# Anchors pytest's rootdir at the repository root (no options on purpose).
#
# Without an ini marker, pytest derives rootdir from the common ancestor of
# every path-like command-line token. The e2e invocations pass reference
# fixtures that live outside the repo (e.g. `--ref ~/redline_ref/layer0.npz`
# while the repo sits under /mnt/c on WSL), so that ancestor degenerates to
# `/` and pytest's directory collection then walks the whole filesystem -
# aborting on unreadable host files before it ever reaches the test module.
# With this file, rootdir resolution stops here and collection stays inside
# the repository regardless of the invoking shell's cwd.
[pytest]
